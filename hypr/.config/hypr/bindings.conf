##########################################
#  ALT-based keybindings using sendshortcut
##########################################

# Text editing
bindd = ALT, C, Universal copy (ALT), sendshortcut, CTRL, C,
bindd = ALT, V, Universal paste (ALT), sendshortcut, CTRL, V,
bindd = ALT, X, Universal cut (ALT), sendshortcut, CTRL, X,
bindd = ALT, A, Universal select all (ALT), sendshortcut, CTRL, A,
bindd = ALT, Z, Universal undo (ALT), sendshortcut, CTRL, Z,
bindd = ALT, S, Universal save (ALT), sendshortcut, CTRL, S,

# Browser - doesn't work
bindd = ALT, T, Browser new tab (ALT), sendshortcut, CTRL, T,
bindd = ALT, W, Browser close tab (ALT), sendshortcut, CTRL, W,
bindd = ALT, Right, Browser next tab (ALT), sendshortcut, CTRL, TAB,
bindd = ALT, Left, Browser previous tab (ALT), sendshortcut, CTRL, SHIFT, TAB,

